<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Promoções</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== Título ===== */
h1 {
  font-size: 5.5rem;
  font-weight: bold;
  text-align: center;
  margin-bottom: 2rem;
}
@media (max-width: 576px) {
  h1 {
    font-size: 2.8rem;
  }
  h6{ font-size: 2.0rem;
    }
  ;
}

/* ===== Cards ===== */
.card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
}

.card img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
}

.card-body {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex-grow: 1;
  text-align: center;
}

/* Preço antigo */
.old {
  text-decoration: line-through;
  color: gray;
  font-size: 18px;
  margin-bottom: 5px;
}

/* Preço novo */
.new {
  font-size: 32px;
  color: red;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Botão */
.btn {
  font-size: 20px;
  padding: 14px 25px;
}

/* ===== Ajustes para celular ===== */
@media (max-width: 576px) {
  .col-12 {
    flex: 0 0 100%;
    max-width: 100%;
  }

  .card {
    min-height: 550px;
  }

  .card img {
    max-height: 350px; /* imagem maior no celular */
  }

  .card-body h6 {
    font-size: 26px; /* nome maior */
    font-weight: bold;
    margin-bottom: 15px;
  }

  .old {
    font-size: 20px;
  }

  .new {
    font-size: 36px;
  }

  .btn {
    font-size: 35px;
    padding: 16px 30px;
  }

  .row#g-produtos {
    gap: 2rem;
  }
}
</style>
</head>

<body class="container py-4">

<h1>🔥 Promoções do Dia</h1>

<div class="row g-3" id="produtos"></div>

<script>
fetch("promos.json")
.then(r => r.json())
.then(lista => {
  let div = document.getElementById("produtos");
  lista.forEach(p => {
    div.innerHTML += `
      <div >
        <div class="card h-100 shadow-sm">
          <img src="${p.img}" class="card-img-top" alt="${p.nome}">
          <div class="card-body">
            <h6>${p.nome}</h6>
            <div class="old">R$ ${p.old}</div>
            <div class="new">R$ ${p.new}</div>
            <a href="${p.link}" target="_blank" class="btn btn-success mt-2">Ver Oferta</a>
          </div>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
