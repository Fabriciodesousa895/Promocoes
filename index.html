<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promoções</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Título */
h1 {
  font-weight: bold;
  text-align: center;
  margin-bottom: 2rem;
}

/* Card hover */
.card:hover {
  transform: scale(1.03);
  transition: transform 0.3s;
}

/* Preço antigo */
.old {
  text-decoration: line-through;
  color: gray;
}

/* Preço novo */
.new {
  color: red;
  font-weight: bold;
}

/* Ajuste imagem */
.card img {
  height: 210px;
  object-fit: cover;
}

/* Mobile sem borda lateral */
@media (max-width: 576px) {
  .card {
    border-radius: 0;
  }
}
</style>
</head>

<body class="container-fluid container-md py-4 px-0 px-md-3">

<h1 class="display-5">🔥 Promoções do Dia</h1>

<div class="row g-2 g-md-3 m-0" id="produtos"></div>

<script>
fetch("promos.json")
.then(r => r.json())
.then(lista => {
  const div = document.getElementById("produtos");

  lista.forEach(p => {
    div.innerHTML += `
      <div class="col-12 col-md-6 col-lg-4 col-xl-3">
        <div class="card h-100 shadow-sm">
          
          <img src="${p.img}" class="card-img-top" alt="${p.nome}">
          
          <div class="card-body d-flex flex-column text-center">
            
            <h5 class="fw-bold">${p.nome}</h5>
            
            <div class="old">R$ ${p.old}</div>
            <div class="new mb-3">R$ ${p.new}</div>

            <a href="${p.link}" target="_blank" class="btn btn-success mt-auto">
              Ver Oferta
            </a>

          </div>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
