<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Promoções</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ===== Título ===== */
h1 {
  font-size: 5rem; /* grande para desktop */
  font-weight: bold;
  text-align: center;
  margin-bottom: 2rem;
}
@media (max-width: 576px) {
  h1 {
    font-size: 3rem; /* adaptável para celular */
  }
}

/* ===== Cards ===== */
.row#g-produtos {
  gap: 1.5rem;
}

.card {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  height: 100%;
  border-radius: 15px;
  overflow: hidden;
  transition: transform 0.3s;
}
.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  max-height: 250px;
  object-fit: cover;
}

.card-body {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  flex-grow: 1;
  text-align: center;
  padding: 1rem;
}

/* Preço antigo */
.old {
  text-decoration: line-through;
  color: gray;
  font-size: 18px;
  margin-bottom: 5px;
}

/* Preço novo */
.new {
  font-size: 28px;
  color: red;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Botão */
.btn {
  font-size: 18px;
  padding: 12px 20px;
}

/* ===== Ajustes para celular ===== */
@media (max-width: 576px) {
  .col-card {
    flex: 0 0 100%;
    max-width: 100%;
  }

  .card img {
    max-height: 300px;
  }

  .card-body h6 {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .old {
    font-size: 20px;
  }

  .new {
    font-size: 32px;
  }

  .btn {
    font-size: 20px;
    padding: 14px 25px;
  }
}
</style>
</head>

<body class="container py-4">

<h1>🔥 Promoções do Dia</h1>

<div class="row g-3" id="g-produtos"></div>

<script>
fetch("promos.json")
.then(r => r.json())
.then(lista => {
  let div = document.getElementById("g-produtos");
  lista.forEach(p => {
    div.innerHTML += `
      <div class="col-12 col-sm-6 col-md-4 col-lg-3 col-card">
        <div class="card h-100 shadow-sm">
          <img src="${p.img}" class="card-img-top" alt="${p.nome}">
          <div class="card-body">
            <h6>${p.nome}</h6>
            <div class="old">R$ ${p.old}</div>
            <div class="new">R$ ${p.new}</div>
            <a href="${p.link}" target="_blank" class="btn btn-success mt-2">Ver Oferta</a>
          </div>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
