<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Promoções</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Título */
h1 {
  font-weight: bold;
  text-align: center;
  margin-bottom: 2rem;
}

/* Card hover */
.card:hover {
  transform: scale(1.03);
  transition: transform 0.3s;
}

/* Preço antigo */
.old {
  text-decoration: line-through;
  color: gray;
}

/* Preço novo */
.new {
  color: red;
  font-weight: bold;
}
</style>
</head>
<body class="container py-4">

<h1 class="display-3">🔥 Promoções do Dia</h1>

<div class="row g-3" id="produtos"></div>

<script>
fetch("promos.json")
.then(r => r.json())
.then(lista => {
  const div = document.getElementById("produtos");
  lista.forEach(p => {
    div.innerHTML += `
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="${p.img}" class="card-img-top img-fluid" alt="${p.nome}">
          <div class="card-body d-flex flex-column justify-content-between text-center">
            <h5 class="fw-bold fs-5 fs-sm-4">${p.nome}</h5>
            <div class="old fs-6 fs-sm-5 mb-1">R$ ${p.old}</div>
            <div class="new fs-4 fs-sm-3 mb-3">R$ ${p.new}</div>
            <a href="${p.link}" target="_blank" class="btn btn-success btn-lg">Ver Oferta</a>
          </div>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
