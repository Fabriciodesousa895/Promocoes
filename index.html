
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoOfertas </title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .sidebar {
      height: 100vh;
      background: #f1f1f1;
      padding-top: 20px;
    }
    .sidebar a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      cursor: pointer;
    }
    .sidebar a:hover {
      background: #ddd;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-danger">
  <div class="container-fluid">
    <span class="navbar-brand">🔥 PromoOfertas</span>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">

    <!-- Categorias -->
    <div class="col-md-3 sidebar">
      <h5 class="px-3">Categorias</h5>
      <a onclick="filtrar('todas')">Todas</a>
      <a onclick="filtrar('Casa, Jardim e Limpeza')">Casa, Jardim e Limpeza</a>
      <a onclick="filtrar('Cozinha')">Cozinha</a>
    </div>

    <!-- Produtos -->
    <div class="col-md-9 p-4">
      <div class="row" id="produtos"></div>
    </div>

  </div>
</div>

<script>
let todosProdutos = [];

fetch('produtos.json')
  .then(res => res.json())
  .then(data => {
    todosProdutos = data;
    mostrarProdutos(data);
  });

function mostrarProdutos(lista) {
  const container = document.getElementById('produtos');
  container.innerHTML = '';

  lista.forEach(p => {
    container.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card h-100">
          <img src="${p.img}" class="card-img-top">
          <div class="card-body">
            <h6>${p.nome}</h6>
            <p><del>R$ ${p.old}</del></p>
            <h5 class="text-danger">R$ ${p.new}</h5>
            <a href="${p.link}" target="_blank" class="btn btn-success w-100">
              Ver na Amazon
            </a>
          </div>
        </div>
      </div>
    `;
  });
}

function filtrar(categoria) {
  if (categoria === 'todas') {
    mostrarProdutos(todosProdutos);
  } else {
    const filtrados = todosProdutos.filter(p => p.categoria === categoria);
    mostrarProdutos(filtrados);
  }
}
</script>

</body>
</html>
