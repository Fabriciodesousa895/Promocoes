<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Promoções</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Estilo das imagens dos cards */
.card img {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* Preço antigo */
.old {
  text-decoration: line-through;
  color: gray;
  font-size: 16px;
  margin-bottom: 5px;
}

/* Preço novo */
.new {
  font-size: 28px;
  color: red;
  font-weight: bold;
  margin-bottom: 15px;
}

/* Botão */
.btn {
  font-size: 18px;
  padding: 12px 20px;
}

/* Ajustes para celular */
@media (max-width: 576px) {
  /* Cada card ocupa toda a largura */
  .col-12 {
    flex: 0 0 100%;
    max-width: 100%;
  }

  .card {
    min-height: 500px; /* card grande */
  }

  .card img {
    max-height: 300px; /* imagem grande */
  }

  .card-body h6 {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
  }

  .old {
    font-size: 18px;
  }

  .new {
    font-size: 32px;
  }

  .btn {
    font-size: 20px;
    padding: 14px 25px;
  }

  .row#g-produtos {
    gap: 2rem; /* espaço maior entre os cards */
  }
}
</style>

</head>

<body class="container py-4">

<h1 class="text-center mb-4">🔥 Promoções do Dia</h1>

<div class="row g-3" id="produtos"></div>

<script>
fetch("promos.json")
.then(r => r.json())
.then(lista => {
  let div = document.getElementById("produtos");
  lista.forEach(p => {
    div.innerHTML += `
      <div class="col-12 col-sm-6 col-md-4 col-lg-3">
        <div class="card h-100 shadow-sm">
          <img src="${p.img}" class="card-img-top" alt="${p.nome}">
          <div class="card-body text-center">
            <h6>${p.nome}</h6>
            <div class="old">R$ ${p.old}</div>
            <div class="new">R$ ${p.new}</div>
            <a href="${p.link}" target="_blank" class="btn btn-success mt-2">Ver Oferta</a>
          </div>
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
