<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Painel Promoções</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container py-4">

<h2>Painel de Promoções</h2>

<div class="mb-2">
<label>Nome</label>
<input id="nome" class="form-control">
</div>

<div class="mb-2">
<label>Imagem URL</label>
<input id="img" class="form-control">
</div>

<div class="mb-2">
<label>Preço original</label>
<input id="old" class="form-control">
</div>

<div class="mb-2">
<label>Preço promoção</label>
<input id="new" class="form-control">
</div>

<div class="mb-2">
<label>Link afiliado</label>
<input id="link" class="form-control">
</div>

<button class="btn btn-success" onclick="add()">Adicionar</button>
<button class="btn btn-primary" onclick="exportar()">Exportar JSON</button>

<hr>

<div id="lista"></div>

<script>

let promos=[]

function render(){

let div=document.getElementById("lista")
div.innerHTML=""

promos.forEach((p,i)=>{

div.innerHTML+=`

<div class="border p-2 mb-2 d-flex justify-content-between">

<b>${p.nome}</b>

<button onclick="remover(${i})" class="btn btn-danger btn-sm">Excluir</button>

</div>

`

})

}

function limparCampos(){

document.getElementById("nome").value=""
document.getElementById("img").value=""
document.getElementById("old").value=""
document.getElementById("new").value=""
document.getElementById("link").value=""

}

function add(){

let p={

nome:document.getElementById("nome").value,
img:document.getElementById("img").value,
old:document.getElementById("old").value,
new:document.getElementById("new").value,
link:document.getElementById("link").value

}

promos.push(p)

render()

limparCampos()

}

function remover(i){

promos.splice(i,1)

render()

}

function exportar(){

let blob=new Blob([JSON.stringify(promos,null,2)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="promos.json"

a.click()

}

</script>

</body>
</html>
