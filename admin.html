<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Painel PromoOfertas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #f8f9fa;
}

.topo {
  background: #dc3545;
  color: white;
  padding: 15px;
  font-weight: bold;
}

.card-produto:hover {
  transform: scale(1.02);
  transition: 0.2s;
}
</style>

</head>

<body>

<div class="topo">🔥 Painel PromoOfertas</div>

<div class="container mt-4">

<!-- IMPORTAR -->
<div class="mb-3">
  <label><b>Importar JSON</b></label>
  <input type="file" class="form-control" id="fileInput">
</div>

<div class="row">

<!-- FORM -->
<div class="col-md-4">

<input id="nome" class="form-control mb-2" placeholder="Nome">
<input id="img" class="form-control mb-2" placeholder="Imagem URL">
<input id="old" class="form-control mb-2" placeholder="Preço original">
<input id="new" class="form-control mb-2" placeholder="Preço promoção">
<input id="link" class="form-control mb-2" placeholder="Link">

<select id="categoria" class="form-control mb-2">
<option>Beleza</option>
<option>Bolsas</option>
<option>Brinquedos</option>
<option>Casa</option>
<option>Celulares</option>
<option>Informática</option>
<option>Cozinha</option>
<option>Eletrônicos</option>
<option>Esportes</option>
<option>Ferramentas</option>
</select>

<button class="btn btn-success w-100 mb-2" onclick="add()">Adicionar</button>
<button class="btn btn-warning w-100 mb-2" onclick="atualizar()" id="btnUpdate" style="display:none">Atualizar</button>
<button class="btn btn-primary w-100" onclick="exportar()">Exportar JSON</button>

</div>

<!-- LISTA -->
<div class="col-md-8">
<h5>Produtos</h5>
<div id="lista" class="row"></div>
</div>

</div>
</div>

<script>

let promos = []
let editIndex = null

// 🔥 IMPORTAÇÃO CORRIGIDA
document.getElementById("fileInput").addEventListener("change", function(event){

  const file = event.target.files[0]
  if (!file) return

  const reader = new FileReader()

  reader.onload = function(e){
    try {
      const data = JSON.parse(e.target.result)

      if (!Array.isArray(data)) {
        alert("JSON inválido (precisa ser lista)")
        return
      }

      promos = data
      render()

    } catch (err) {
      console.error(err)
      alert("Erro ao ler JSON")
    }
  }

  reader.readAsText(file)

})

// 🔥 RENDER
function render(){

const div = document.getElementById("lista")
div.innerHTML = ""

if (promos.length === 0){
  div.innerHTML = "<p>Nenhum produto carregado</p>"
  return
}

promos.forEach((p,i)=>{

div.innerHTML += `
<div class="col-md-6 mb-3">
  <div class="card shadow-sm h-100 card-produto">

    <img src="${p.img || ''}" class="card-img-top" style="height:150px;object-fit:contain">

    <div class="card-body text-center">

      <h6>${p.nome || ''}</h6>
      <small>${p.categoria || ''}</small>

      <p><del>R$ ${p.old || ''}</del></p>
      <h5 class="text-danger">R$ ${p.new || ''}</h5>

      <div class="d-flex gap-2">
        <button onclick="editar(${i})" class="btn btn-warning w-50">Editar</button>
        <button onclick="remover(${i})" class="btn btn-danger w-50">Excluir</button>
      </div>

    </div>

  </div>
</div>
`
})

}

// 🔥 ADD
function add(){

const nome = document.getElementById("nome").value

if (!nome){
  alert("Preencha o nome")
  return
}

let p = {
nome: nome,
img: document.getElementById("img").value,
old: document.getElementById("old").value,
new: document.getElementById("new").value,
link: document.getElementById("link").value,
categoria: document.getElementById("categoria").value
}

promos.push(p)

render()
limpar()

}

// 🔥 EDITAR
function editar(i){

let p = promos[i]

document.getElementById("nome").value = p.nome
document.getElementById("img").value = p.img
document.getElementById("old").value = p.old
document.getElementById("new").value = p.new
document.getElementById("link").value = p.link
document.getElementById("categoria").value = p.categoria

editIndex = i
document.getElementById("btnUpdate").style.display = "block"

}

// 🔥 ATUALIZAR
function atualizar(){

if (editIndex === null) return

promos[editIndex] = {
nome: document.getElementById("nome").value,
img: document.getElementById("img").value,
old: document.getElementById("old").value,
new: document.getElementById("new").value,
link: document.getElementById("link").value,
categoria: document.getElementById("categoria").value
}

render()
limpar()

}

// 🔥 REMOVER
function remover(i){

if(confirm("Excluir produto?")){
promos.splice(i,1)
render()
}

}

// 🔥 LIMPAR
function limpar(){

document.getElementById("nome").value = ""
document.getElementById("img").value = ""
document.getElementById("old").value = ""
document.getElementById("new").value = ""
document.getElementById("link").value = ""
document.getElementById("categoria").value = "Beleza"

editIndex = null
document.getElementById("btnUpdate").style.display = "none"

}

// 🔥 EXPORTAR (CORRIGIDO)
function exportar(){

if (promos.length === 0){
  alert("Nada para exportar")
  return
}

const json = JSON.stringify(promos, null, 2)

const blob = new Blob([json], {type: "application/json"})

const url = URL.createObjectURL(blob)

const a = document.createElement("a")
a.href = url
a.download = "promos.json"
a.click()

URL.revokeObjectURL(url)

}

</script>

</body>
</html>
