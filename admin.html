<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<title>Painel Promoções</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container py-4">

<h2>Painel de Promoções</h2>

<div class="mb-2">
<label>Nome</label>
<input id="nome" class="form-control">
</div>

<div class="mb-2">
<label>Imagem URL</label>
<input id="img" class="form-control">
</div>

<div class="mb-2">
<label>Preço original</label>
<input id="old" class="form-control">
</div>

<div class="mb-2">
<label>Preço promoção</label>
<input id="new" class="form-control">
</div>

<div class="mb-2">
<label>Link afiliado</label>
<input id="link" class="form-control">
</div>

<div class="mb-2">
<label>Categoria</label>
<select id="categoria" class="form-control">
<option>Beleza</option>
<option>Bolsas</option>
<option>Brinquedos</option>
<option>Casa</option>
<option>Celulares</option>
<option>Informática</option>
<option>Cozinha</option>
<option>Eletrônicos</option>
<option>Esportes</option>
<option>Ferramentas</option>
</select>
</div>

<button class="btn btn-success" onclick="add()">Adicionar</button>
<button class="btn btn-warning" onclick="atualizar()" id="btnUpdate" style="display:none">Atualizar</button>
<button class="btn btn-primary" onclick="exportar()">Exportar JSON</button>

<hr>

<div id="lista"></div>

<script>

let promos = []
let editIndex = null

// 🔥 CARREGAR JSON EXISTENTE
fetch('promos.json')
  .then(res => res.json())
  .then(data => {
    promos = data
    render()
  })
  .catch(() => {
    console.warn("Nenhum JSON carregado (normal se estiver local)")
  })

function render(){

let div=document.getElementById("lista")
div.innerHTML=""

promos.forEach((p,i)=>{

div.innerHTML+=`

<div class="border p-2 mb-2">

<b>${p.nome}</b> - ${p.categoria} <br>
<small>R$ ${p.old} → <b>R$ ${p.new}</b></small>

<div class="mt-2">
<button onclick="editar(${i})" class="btn btn-warning btn-sm">Editar</button>
<button onclick="remover(${i})" class="btn btn-danger btn-sm">Excluir</button>
</div>

</div>

`

})

}

function limparCampos(){

nome.value=""
img.value=""
old.value=""
new.value=""
link.value=""
categoria.value="Beleza"

editIndex=null
btnUpdate.style.display="none"

}

function add(){

let p={

nome:nome.value,
img:img.value,
old:old.value,
new:new.value,
link:link.value,
categoria:categoria.value

}

promos.push(p)

render()
limparCampos()

}

function editar(i){

let p = promos[i]

nome.value=p.nome
img.value=p.img
old.value=p.old
new.value=p.new
link.value=p.link
categoria.value=p.categoria

editIndex = i

btnUpdate.style.display="inline-block"

}

function atualizar(){

promos[editIndex] = {

nome:nome.value,
img:img.value,
old:old.value,
new:new.value,
link:link.value,
categoria:categoria.value

}

render()
limparCampos()

}

function remover(i){

if(confirm("Deseja excluir?")){

promos.splice(i,1)
render()

}

}

function exportar(){

let blob=new Blob([JSON.stringify(promos,null,2)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="promos.json"

a.click()

}

</script>

</body>
</html>
